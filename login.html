<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Metals Storage</title>
  <link rel="stylesheet" href="loginpage.css" />
  <link rel="icon" type="image/x-icon" href="images/Logo.png" />
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="Images/newlogo.png" alt="Metals Storage Logo" />
      <h1>METALS</h1>
    </div>

    <div class="login-box">
      <h2>Login</h2>
      <form id="loginForm" method="post">
        <label for="email">Email or Username</label>
        <input type="email" id="email" name="email" required placeholder="Enter your email or username" />

        <label for="myInput">Password</label>
        <input type="password" id="myInput" name="password" required placeholder="Enter your password" />

        <div class="show-password">
          <label>
            <input type="checkbox" onclick="document.getElementById('myInput').type = this.checked ? 'text' : 'password'" />
          Show Password</label>
        </div>

        <button type="button" class="login-button" onclick="loginUser()">Login</button>

        <div class="bottom-links">
          <a href="#">Forgot password?</a><br>
          <span>Don't have an account? <a onclick="openRegister()">Sign up</a></span>
        </div>
      </form>
    </div>
    <div class="Register-box">
      <h2>Register</h2>
      <form id="registerForm" method="post">
        <label for="regEmail">Email</label>
        <input type="email" id="regEmail" name="regEmail" required placeholder="Enter your email" />

        <label for="regPassword">Password</label>
        <input type="password" id="regPassword" name="regPassword" required placeholder="Enter your password" />

        <label for="shopName">Shop Name</label>
        <input type="text" id="shopName" name="shopName" required placeholder="Enter your shop name" />

        <div class="show-password">
          <label>
            <input type="checkbox" onclick="document.getElementById('regPassword').type = this.checked ? 'text' : 'password'" />
          Show Password</label>
        </div>

        <button type="button" class="Register-button" onclick="registerUser()">Register</button>

        <div class="bottom-links">
          <a href="#">Forgot password?</a><br>
          <span>have an account? <a onclick="openLogin()">Sign in</a></span>
        </div>
      </form>
    </div>

  </div>

  <script>
    const url = "https://develmets.skiscratcher.com";


    window.onload = async function () {
      try {
        const response = await fetch(url +"/logininfo", {
          method: "GET",
          credentials: "include"
        });
        const contentType = response.headers.get("content-type");
        if (contentType && contentType.includes("application/json")) {
          const data = await response.json();
          if (data.loggedIn) {
            window.location.href = "itemlist.html";
          }
        }
      } catch (error) {
        console.error("Session check failed", error);
      }
    };

    async function loginUser() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("myInput").value;

      const fd = new URLSearchParams({ email, password });

      try {
        const response = await fetch(url + "/login", {
          method: "POST",
          body: fd,
          credentials: "include",
          headers: {
            "Content-Type": "application/x-www-form-urlencoded"
          }
        });

        const contentType = response.headers.get("content-type") || "";
        if (!contentType.includes("application/json")) {
          const html = await response.text();
          console.error("Expected JSON but got:", html);
          alert("Login failed or server returned unexpected data.");
          return;
        }

        const json = await response.json();
        if (json.login === true) {
          window.location.href = "itemlist.html";
        } else {
          alert("Login failed. Check your credentials.");
        }
      } catch (error) {
        console.error("Login error:", error);
        alert("Login request failed.");
      }
    }
    async function registerUser() {
      const email = document.getElementById("regEmail").value;
      const password = document.getElementById("regPassword").value;
      const shopName = document.getElementById("shopName").value;


      const fd = new URLSearchParams({ email, password, shopName });

      try {
        const response = await fetch(url + "/registerAdminAccount", {
          method: "POST",
          body: fd,
          credentials: "include",
          headers: {
            "Content-Type": "application/x-www-form-urlencoded"
          }
        });

        const contentType = response.headers.get("content-type") || "";
        if (!contentType.includes("application/json")) {
          const html = await response.text();
          console.error("Expected JSON but got:", html);
          alert("Registration failed or server returned unexpected data.");
          return;
        }

        const json = await response.json();
        if (json.register === true) {
          window.location.href = "itemlist.html";
        } else {
          alert("Registration failed. Please try again.");
        }
      } catch (error) {
        console.error("Registration error:", error);
        alert("Registration request failed.");
      }
    }

    function openRegister() {
      document.getElementsByClassName("login-box")[0].style.display = "none";
      document.getElementsByClassName("Register-box")[0].style.display = "block";
    }
    function openLogin() {
      document.getElementsByClassName("login-box")[0].style.display = "block";
      document.getElementsByClassName("Register-box")[0].style.display = "none";
    }
  </script>
</body>
</html>
